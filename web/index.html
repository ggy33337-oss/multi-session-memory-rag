<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memory RAG</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">M</div>
          <div>
            <h1>Memory RAG</h1>
            <p id="service-status">检查服务中</p>
          </div>
        </div>

        <section class="panel">
          <div class="panel-head">
            <h2>最近会话</h2>
            <button id="refresh-history" class="icon-button" type="button" aria-label="刷新历史" title="刷新历史">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M21 12a9 9 0 0 1-15.1 6.6" />
                <path d="M3 12A9 9 0 0 1 18.1 5.4" />
                <path d="M18 2v4h-4" />
                <path d="M6 22v-4h4" />
              </svg>
            </button>
          </div>
          <div id="history-list" class="history-list"></div>
        </section>

        <section class="panel compact">
          <h2>检索参数</h2>
          <dl class="meta-grid">
            <div>
              <dt>Recent</dt>
              <dd>5 Turns</dd>
            </div>
            <div>
              <dt>Top K</dt>
              <dd>3</dd>
            </div>
            <div>
              <dt>Vector</dt>
              <dd>FAISS</dd>
            </div>
          </dl>
        </section>
      </aside>

      <section class="workspace">
        <header class="topbar">
          <div>
            <h2>对话记忆工作台</h2>
            <p>Recent Turns + Retrieved Turns + User Query</p>
          </div>
          <button id="clear-history" class="ghost-button" type="button">清空历史</button>
        </header>

        <div id="chat-stream" class="chat-stream" aria-live="polite"></div>

        <form id="chat-form" class="composer">
          <textarea id="message-input" rows="3" placeholder="输入问题，例如：审核Agent怎么设计？"></textarea>
          <div class="composer-actions">
            <span id="request-state"></span>
            <button id="send-button" class="send-button" type="submit">
              <span>发送</span>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M22 2 11 13" />
                <path d="m22 2-7 20-4-9-9-4Z" />
              </svg>
            </button>
          </div>
        </form>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
