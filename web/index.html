<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>多会话长期记忆 RAG 问答系统</title>
    <link rel="stylesheet" href="/static/styles.css?v=3" />
  </head>
  <body>
    <main class="shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">M</div>
          <div>
            <h1>多会话长期记忆 RAG 问答系统</h1>
            <p id="service-status">检查服务中</p>
          </div>
        </div>

        <section class="panel">
          <div class="panel-head">
            <h2>会话窗口</h2>
            <button id="new-session" class="icon-button" type="button" aria-label="新建会话" title="新建会话">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 5v14" />
                <path d="M5 12h14" />
              </svg>
            </button>
            <button id="refresh-sessions" class="icon-button" type="button" aria-label="刷新会话" title="刷新会话">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M21 12a9 9 0 0 1-15.1 6.6" />
                <path d="M3 12A9 9 0 0 1 18.1 5.4" />
                <path d="M18 2v4h-4" />
                <path d="M6 22v-4h4" />
              </svg>
            </button>
          </div>
          <div id="session-list" class="session-list"></div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>当前会话历史</h2>
            <button id="refresh-history" class="icon-button" type="button" aria-label="刷新历史" title="刷新历史">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M21 12a9 9 0 0 1-15.1 6.6" />
                <path d="M3 12A9 9 0 0 1 18.1 5.4" />
                <path d="M18 2v4h-4" />
                <path d="M6 22v-4h4" />
              </svg>
            </button>
          </div>
          <div id="history-list" class="history-list"></div>
        </section>

        <section class="panel compact">
          <h2>检索参数</h2>
          <dl class="meta-grid">
            <div>
              <dt>Recent</dt>
              <dd>5 Turns</dd>
            </div>
            <div>
              <dt>Top K</dt>
              <dd>3</dd>
            </div>
            <div>
              <dt>Vector</dt>
              <dd>pgvector</dd>
            </div>
          </dl>
        </section>

        <section class="panel document-panel">
          <div class="panel-head">
            <h2>文档知识库</h2>
            <button id="refresh-documents" class="icon-button" type="button" aria-label="刷新文档" title="刷新文档">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M21 12a9 9 0 0 1-15.1 6.6" />
                <path d="M3 12A9 9 0 0 1 18.1 5.4" />
                <path d="M18 2v4h-4" />
                <path d="M6 22v-4h4" />
              </svg>
            </button>
          </div>
          <form id="document-form" class="document-form">
            <input id="document-input" type="file" accept=".txt,.md,.pdf" />
            <button id="upload-document" class="ghost-button" type="submit">上传文档</button>
          </form>
          <div id="document-state" class="document-state"></div>
          <div id="document-list" class="document-list"></div>
          <button id="clear-documents" class="ghost-button full" type="button">清空文档</button>
        </section>
      </aside>

      <section class="workspace">
        <header class="topbar">
          <div>
            <h2 id="active-session-title">多会话长期记忆 RAG 问答系统</h2>
            <p>当前窗口历史隔离，文档知识库全局共享</p>
          </div>
          <button id="clear-history" class="ghost-button" type="button">清空历史</button>
        </header>

        <div id="chat-stream" class="chat-stream" aria-live="polite"></div>

        <form id="chat-form" class="composer">
          <textarea id="message-input" rows="3" placeholder="输入问题，例如：审核Agent怎么设计？"></textarea>
          <div class="composer-actions">
            <span id="request-state"></span>
            <button id="send-button" class="send-button" type="submit">
              <span>发送</span>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M22 2 11 13" />
                <path d="m22 2-7 20-4-9-9-4Z" />
              </svg>
            </button>
          </div>
        </form>
      </section>
    </main>

    <script src="/static/app.js?v=3"></script>
  </body>
</html>
